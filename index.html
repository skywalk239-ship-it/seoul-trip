/* 수채화/그림 느낌 오버레이 */
.bg-paint {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(20,50,10,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(10,30,5,0.7) 0%, transparent 60%);
  mix-blend-mode: multiply;
}
.bg-grain {
  position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── SCREEN SYSTEM ── */
.screen { display:none !important; position:relative; z-index:3; }
.screen.active { display:block !important; }

/* ── LANG TOGGLE ── */
.lang-toggle {
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: rgba(0,0,0,0.45);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  width: 40px;
}
.lang-btn {
  padding: 5px 0;
  border-radius: 6px;
  border: none;
  background: transparent;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  color: var(--text3);
  transition: all 0.2s;
  text-align: center;
  width: 100%;
  letter-spacing: 0.5px;
}
.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ── JOIN SCREEN ── */
#screen-join {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
.join-card {
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1.5px solid var(--border);
  border-radius: var(--card-r);
  padding: 32px 24px 28px;
  width: 100%; max-width: 360px;

// ── INIT: 로컬 우선, DB는 보조 ──
// days 데이터 유효성 검사 - ko 필드와 events 배열이 있어야 유효
var DATA_VERSION = 'v2';
function isValidDays(days) {
  if (!Array.isArray(days) || days.length === 0) return false;
  var d = days[0];
  if (!d || !d.date || !d.weekday) return false;
  if (!Array.isArray(d.events)) return false;
  return true;
}

window.addEventListener('load', function() {
  initParticles();
  startSpeech();
  try {
    // 버전 체크 - 구버전이면 localStorage 초기화
    var ver = localStorage.getItem('data_version');
    if (ver !== DATA_VERSION) {
      localStorage.removeItem('last_trip');
      localStorage.setItem('data_version', DATA_VERSION);
    }
    var saved = localStorage.getItem('last_trip');
    if (saved) {
      var parsed = JSON.parse(saved);
      if (isValidDays(parsed.days)) {
        currentTrip = { id: parsed.id, code: parsed.code, days: parsed.days };
        enterTrip();
        return;
      } else {
        // 유효하지 않은 데이터 → 초기화
        localStorage.removeItem('last_trip');
      }
    }
  } catch(e) {
    try { localStorage.removeItem('last_trip'); } catch(e2) {}
  }
  showScreen('join');
});

// 백그라운드 DB 동기화 - DB 데이터 항상 우선
async function syncFromDB(code) {
  try {
    var sb = getSB();
    if (!sb) return;
    var res = await sb.from('trips').select('*').eq('code', code).single();
    if (!res.error && res.data && isValidDays(res.data.days)) {
      // DB 데이터가 로컬보다 항상 우선
      currentTrip.days = res.data.days;
      currentTrip.id = res.data.id;
      saveLocal();
      // 어떤 화면이든 업데이트
      if (document.getElementById('screen-days').classList.contains('active')) {
        renderTabBar();
        renderDay(currentDay);
        showToast('🔄 최신 데이터로 업데이트됨');
      } else if (document.getElementById('screen-main').classList.contains('active')) {
        showToast('🔄 최신 데이터 로드됨');
      }
      subscribeRealtime();
    }
  } catch(e) {}
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  var el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');
  // join 화면 열릴 때마다 최근 방 목록 갱신
  if (name === 'join') renderRecentRooms();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function saveLocal() {
  if (!currentTrip) return;
  try {
    localStorage.setItem('last_trip', JSON.stringify({
      id: currentTrip.id,
      code: currentTrip.code,
      days: currentTrip.days
    }));
    // 최근 방 목록에도 저장
    saveRecentRoom(currentTrip.code, currentTrip.days);
  } catch(e) {}
}

// ── 최근 방 목록 관리 ──
function saveRecentRoom(code, days) {
  try {
    var rooms = getRecentRooms();
    // 이름: Day 4 subtitle 또는 기본값
    var name = '서울 & 강릉 데이뜨♥';
    // 기존에 같은 코드 있으면 제거
    rooms = rooms.filter(function(r) { return r.code !== code; });
    // 맨 앞에 추가 (최대 5개)
    rooms.unshift({ code: code, name: name, ts: Date.now() });
    if (rooms.length > 5) rooms = rooms.slice(0, 5);
    localStorage.setItem('recent_rooms', JSON.stringify(rooms));
  } catch(e) {}
}

function getRecentRooms() {
  try {
    var saved = localStorage.getItem('recent_rooms');
    return saved ? JSON.parse(saved) : [];
  } catch(e) { return []; }
}

function removeRecentRoom(code) {
  try {
    var rooms = getRecentRooms().filter(function(r) { return r.code !== code; });
    localStorage.setItem('recent_rooms', JSON.stringify(rooms));
    renderRecentRooms();
  } catch(e) {}
}

function renderRecentRooms() {
  var rooms = getRecentRooms();
  var wrap = document.getElementById('recentRooms');
  var list = document.getElementById('roomList');
  if (!wrap || !list) return;
  if (rooms.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = '';
  rooms.forEach(function(r) {
    var item = document.createElement('div');
    item.className = 'room-item';

    var left = document.createElement('div');
    left.className = 'room-item-left';
    left.innerHTML = '<div class="room-item-name">🗺️ ' + r.name + '</div><div class="room-item-code">' + r.code + '</div>';

    var del = document.createElement('div');
    del.className = 'room-item-del';
    del.textContent = '✕';
    del.onclick = function(e) { e.stopPropagation(); removeRecentRoom(r.code); };

    item.appendChild(left);
    item.appendChild(del);
    item.onclick = function() { quickEnterRoom(r.code); };
    list.appendChild(item);
  });
}

async function quickEnterRoom(code) {
  // 항상 DB에서 최신 데이터 로드
  try {
    var sb = getSB();
    if (sb) {
      var res = await sb.from('trips').select('*').eq('code', code).single();
      if (!res.error && res.data && isValidDays(res.data.days)) {
        currentTrip = { id: res.data.id, code: res.data.code, days: res.data.days };
        saveLocal();
        enterTrip();
        subscribeRealtime();
        return;
      }
    }
  } catch(e) {}
  // DB 실패시 localStorage fallback
  try {
    var saved = localStorage.getItem('last_trip');
    if (saved) {
      var parsed = JSON.parse(saved);
      if (parsed.code === code && isValidDays(parsed.days)) {
        currentTrip = { id: parsed.id, code: parsed.code, days: parsed.days };
        enterTrip();
        return;
      }
    }
  } catch(e2) {}
  // 없으면 DB에서 로드
  var errEl = document.getElementById('joinError');
  if (errEl) errEl.textContent = '불러오는 중...';
  try {
    var sb = getSB();
    if (sb) {
      var res = await sb.from('trips').select('*').eq('code', code).single();
      if (!res.error && res.data && isValidDays(res.data.days)) {
        currentTrip = { id: res.data.id, code: res.data.code, days: res.data.days };
        saveLocal();
        if (errEl) errEl.textContent = '';
        enterTrip(); subscribeRealtime(); return;
      }
    }
  } catch(e) {}
  if (errEl) errEl.textContent = '불러오기 실패';
}

// ── 새 여행 만들기: 무조건 로컬로 즉시 진입 ──
async function createTrip() {
  var code = Math.random().toString(36).substring(2,8).toUpperCase();
  var days = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  currentTrip = { id: 'local_' + Date.now(), code: code, days: days };
  saveLocal();
  enterTrip(); // 즉시 메인 화면으로

  // 백그라운드에서 DB 저장 시도
  try {
    var sb = getSB();
    if (sb) {
      var res = await sb.from('trips').insert({ code: code, days: days }).select().single();
      if (res.data && !res.error) {
        currentTrip.id = res.data.id;
        saveLocal();
        subscribeRealtime();
      }
    }
  } catch(e) {}
}

// ── 코드로 입장: DB 먼저, 실패시 에러 표시 ──
async function joinTrip() {
  var codeEl = document.getElementById('joinCode');
  var errEl = document.getElementById('joinError');
  var code = codeEl ? codeEl.value.trim().toUpperCase() : '';
  if (code.length < 6) {
    if (errEl) errEl.textContent = '6자리 코드를 입력해주세요';
    return;
  }
  if (errEl) errEl.textContent = '찾는 중...';
  var sb = getSB();
  if (!sb) {
    if (errEl) errEl.textContent = '❌ Supabase 연결 실패';
    return;
  }
  try {
    if (errEl) errEl.textContent = '🔍 DB 조회 중...';
    var res = await sb.from('trips').select('*').eq('code', code).single();
    if (res.error) {
      if (errEl) errEl.textContent = '❌ 에러: ' + JSON.stringify(res.error).slice(0,80);
      return;
    }
    if (!res.data) {
      if (errEl) errEl.textContent = '❌ 데이터 없음';
      return;
    }
    if (errEl) errEl.textContent = '✅ 찾음! days: ' + (res.data.days ? res.data.days.length : 0) + '개';
    var days = isValidDays(res.data.days) ? res.data.days : JSON.parse(JSON.stringify(DEFAULT_DAYS));
    currentTrip = { id: res.data.id, code: res.data.code, days: days };
    saveLocal();
    setTimeout(function() {
      if (errEl) errEl.textContent = '';
      enterTrip();
      subscribeRealtime();
    }, 1500);
  } catch(e) {
    if (errEl) errEl.textContent = '❌ 예외: ' + (e.message || String(e)).slice(0,80);
  }
}

function subscribeRealtime() {
  if (!currentTrip || currentTrip.id.startsWith('local_')) return;
  try {
    var sb = getSB();
    if (!sb) return;
    if (realtimeSub) sb.removeChannel(realtimeSub);
    realtimeSub = sb.channel('trip_' + currentTrip.id)
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'trips', filter:'id=eq.'+currentTrip.id },
        function(payload) {
          if (payload.new.days) currentTrip.days = payload.new.days;
          saveLocal();
          renderDay(currentDay);
          showToast('📡 업데이트됨!');
        })
      .subscribe();
  } catch(e) {}
}

function enterTrip() {
  var el = document.getElementById('mainCodeText');
  if (el) el.textContent = currentTrip.code;
  // 최근 방 목록에 저장
  if (currentTrip) saveRecentRoom(currentTrip.code, currentTrip.days);
  showScreen('main');
}

function goToDays() {
  renderTabBar();
  renderDay(0);
  showScreen('days');
}

function clearLocal() {
  try { localStorage.removeItem('last_trip'); } catch(e) {}
  currentTrip = null;
  var jc = document.getElementById('joinCode');
  var je = document.getElementById('joinError');
  if (jc) jc.value = '';
  if (je) je.textContent = '';
  showScreen('join');
}

function copyCode() {
  if (!currentTrip) return;
  try {
    navigator.clipboard.writeText(currentTrip.code).then(function() {
      showToast('📎 복사됨: ' + currentTrip.code);
    });
  } catch(e) { showToast('코드: ' + currentTrip.code); }
}

// ── RENDER ──
function renderTabBar() {
  var wrap = document.getElementById('tabsWrap');
  if (!wrap || !currentTrip) return;
  wrap.innerHTML = '';
  currentTrip.days.forEach(function(d, i) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === currentDay ? ' active' : '');
    btn.textContent = 'DAY ' + (i+4) + ' (' + d.weekday + ')';
    btn.onclick = function() { renderDay(i); };
    wrap.appendChild(btn);
  });
}

function renderDay(idx) {
  if (!currentTrip || !currentTrip.days[idx]) return;
  currentDay = idx;
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === idx);
  });
  var d = currentTrip.days[idx];
  var content = document.getElementById('dayContent');
  if (!content) return;
  var sub = currentLang === 'ko' ? d.subtitle_ko : (d.subtitle_jp || d.subtitle_en || d.subtitle_ko);
  content.innerHTML =
    '<div class="day-header">' +
      '<div class="day-header-left">' +
        '<div class="dh-day">DAY ' + (idx+4) + '</div>' +
        '<div class="dh-date">' + d.date.slice(5).replace('-','/') + ' (' + d.weekday + ')</div>' +
        '<div class="dh-sub">' + sub + '</div>' +
      '</div>' +
      '<div class="day-header-right">' + d.emoji + '</div>' +
    '</div>' +
    '<div class="timeline" id="tl-' + idx + '"></div>' +
    '<button class="btn-add-ev" onclick="openAddModal(' + idx + ')">＋ 일정 추가</button>';
  var tl = document.getElementById('tl-' + idx);
  if (tl) d.events.forEach(function(ev, ei) { tl.appendChild(renderEv(ev, ei, idx)); });
}

function renderEv(ev, ei, di) {
  var wrap = document.createElement('div');
  wrap.className = 'ev-item';
  wrap.onclick = function() { openEditModal(di, ei); };
  var tagLabels = { food:'식사', drink:'음료', shop:'쇼핑', nature:'관광', hotel:'숙소', transport:'이동', reserved:'예약', tbd:'미정', etc:'기타' };
  var title = currentLang === 'ko' ? (ev.ko || '') : (ev.jp || ev.en || ev.ko || '');
  wrap.innerHTML =
    '<span class="ev-time">' + (ev.time || '') + '</span>' +
    '<div class="ev-dot ' + (ev.hi ? 'hi' : '') + '"></div>' +
    '<div class="ev-card">' +
      '<div class="ev-card-top">' +
        '<span class="ev-tag tag-' + (ev.cat || 'etc') + '">' + (tagLabels[ev.cat] || '기타') + '</span>' +
        '<span class="ev-title">' + title + '</span>' +
      '</div>' +
      (ev.place_ko ? '<div class="ev-place">📍 ' + ev.place_ko + '</div>' : '') +
      (ev.memo ? '<div class="ev-memo">' + ev.memo + '</div>' : '') +
    '</div>';
  return wrap;
}

// ── MODAL ──
var modalMode = null, modalDayIdx = null;

function openEditModal(di, ei) {
  modalMode = 'edit'; modalDayIdx = di; editingEvIdx = ei;
  var ev = currentTrip.days[di].events[ei];
  document.getElementById('modalTitle').textContent = '일정 편집';
  document.getElementById('mTime').value = ev.time || '';
  document.getElementById('mCat').value = ev.cat || 'etc';
  document.getElementById('mTitleKo').value = ev.ko || '';
  document.getElementById('mPlace').value = ev.place_ko || '';
  document.getElementById('mMemo').value = ev.memo || '';
  document.getElementById('mHi').checked = !!ev.hi;
  document.getElementById('btnDelEv').style.display = 'block';
  document.getElementById('modalOverlay').classList.add('open');
}

function openAddModal(di) {
  modalMode = 'add'; modalDayIdx = di; editingEvIdx = null;
  document.getElementById('modalTitle').textContent = '일정 추가';
  document.getElementById('mTime').value = '';
  document.getElementById('mCat').value = 'etc';
  document.getElementById('mTitleKo').value = '';
  document.getElementById('mPlace').value = '';
  document.getElementById('mMemo').value = '';
  document.getElementById('mHi').checked = false;
  document.getElementById('btnDelEv').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

// ── 자동 번역 (Anthropic API) ──
var translateTimer = null;
function autoTranslate() {
  var ko = document.getElementById('mTitleKo').value.trim();
  var statusEl = document.getElementById('translateStatus');
  var jpEl = document.getElementById('mTitleJp');
  if (!ko) { if (jpEl) jpEl.value = ''; return; }
  if (translateTimer) clearTimeout(translateTimer);
  translateTimer = setTimeout(async function() {
    if (statusEl) statusEl.textContent = '번역 중...';
    try {
      var res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 100,
          messages: [{
            role: 'user',
            content: '다음 한국어 여행 일정 텍스트를 자연스러운 일본어로 번역해줘. 번역문만 출력하고 설명은 하지 마: ' + ko
          }]
        })
      });
      var data = await res.json();
      var translated = data.content && data.content[0] && data.content[0].text;
      if (translated && jpEl) {
        jpEl.value = translated.trim();
        if (statusEl) statusEl.textContent = '✓';
        setTimeout(function() { if (statusEl) statusEl.textContent = ''; }, 2000);
      }
    } catch(e) {
      if (statusEl) statusEl.textContent = '번역 실패';
      setTimeout(function() { if (statusEl) statusEl.textContent = ''; }, 2000);
    }
  }, 800);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveEv() {
  var ev = {
    time: document.getElementById('mTime').value,
    cat: document.getElementById('mCat').value,
    ko: document.getElementById('mTitleKo').value,
    en: document.getElementById('mTitleKo').value,
    jp: document.getElementById('mTitleJp').value || document.getElementById('mTitleKo').value,
    place_ko: document.getElementById('mPlace').value,
    memo: document.getElementById('mMemo').value,
    hi: document.getElementById('mHi').checked
  };
  if (modalMode === 'edit') {
    currentTrip.days[modalDayIdx].events[editingEvIdx] = ev;
  } else {
    currentTrip.days[modalDayIdx].events.push(ev);
    currentTrip.days[modalDayIdx].events.sort(function(a,b) {
      return (a.time||'').localeCompare(b.time||'');
    });
  }
  closeModal();
  renderDay(currentDay);
  saveLocal();
  schedSave();
}

function deleteEv() {
  currentTrip.days[modalDayIdx].events.splice(editingEvIdx, 1);
  closeModal();
  renderDay(currentDay);
  saveLocal();
  schedSave();
}

function schedSave() {
  var ind = document.getElementById('saveIndicator');
  if (ind) { ind.textContent = '저장 중...'; ind.className = 'save-indicator saving'; }
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, 800);
}

async function autoSave() {
  var ind = document.getElementById('saveIndicator');
  if (!currentTrip) return;
  try {
    var sb = getSB();
    if (!sb) {
      if (ind) { ind.textContent = '로컬 저장됨'; ind.className = 'save-indicator saved'; }
      return;
    }
    // local_ ID면 DB에 새로 insert해서 공유 가능하게
    if (currentTrip.id.startsWith('local_')) {
      // 먼저 같은 코드가 이미 있는지 확인
      var check = await sb.from('trips').select('id').eq('code', currentTrip.code).single();
      if (!check.error && check.data) {
        // 이미 있으면 그 id로 업데이트
        currentTrip.id = check.data.id;
        await sb.from('trips').update({ days: currentTrip.days }).eq('id', currentTrip.id);
        saveLocal();
        subscribeRealtime();
        if (ind) { ind.textContent = '✓ 공유됨'; ind.className = 'save-indicator saved'; }
        showToast('✓ 공유됨');
      } else {
        // 없으면 새로 insert
        var res = await sb.from('trips').insert({ code: currentTrip.code, days: currentTrip.days }).select().single();
        if (!res.error && res.data) {
          currentTrip.id = res.data.id;
          saveLocal();
          subscribeRealtime();
          if (ind) { ind.textContent = '✓ 공유됨'; ind.className = 'save-indicator saved'; }
          showToast('✓ 공유됨');
        } else {
          if (ind) { ind.textContent = '로컬 저장됨'; ind.className = 'save-indicator saved'; }
          showToast('로컬 저장됨');
        }
      }
    } else {
      await sb.from('trips').update({ days: currentTrip.days }).eq('id', currentTrip.id);
      if (ind) { ind.textContent = '✓ 저장됨'; ind.className = 'save-indicator saved'; }
      showToast('✓ 저장됨');
    }
  } catch(e) {
    if (ind) { ind.textContent = '로컬 저장됨'; ind.className = 'save-indicator saved'; }
  }
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
</script>
